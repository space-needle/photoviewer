services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      PHOTOVIEWER_DATA_DIR: /data
      PHOTOVIEWER_THUMBNAILS_DIR: /thumbnails
    volumes:
      - ./data:/data
      - ./photos:/photos
      - ./thumbnails:/thumbnails
    restart: unless-stopped
