services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-}
      MS_CLIENT_ID: ${MS_CLIENT_ID:-}
      MS_TENANT_ID: ${MS_TENANT_ID:-common}
      ONEDRIVE_SCOPES: ${ONEDRIVE_SCOPES:-Files.Read offline_access User.Read}
      PHOTOVIEWER_DATA_DIR: /data
      PHOTOVIEWER_THUMBNAILS_DIR: /thumbnails
    volumes:
      - ./data:/data
      - ./photos:/photos
      - ./thumbnails:/thumbnails
    restart: unless-stopped
